# merjs Cloudflare Workers config
# Customise these for your project before deploying.

name = "merjs"           # ← your Workers project name
main = "worker.js"
compatibility_date = "2024-12-01"

# Uncomment and set your custom domain or route:
# routes = [
#   { pattern = "example.com", custom_domain = true }
# ]

[assets]
directory = "../public"

[build]
command = "cd .. && zig build worker"

[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]

# Uncomment if you need R2 storage:
# [[r2_buckets]]
# binding = "BUCKET"
# bucket_name = "my-bucket"
