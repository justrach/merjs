name: CI — merjs E2E tests

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    name: E2E via agentic-browdie

    steps:
      - name: Checkout merjs
        uses: actions/checkout@v4

      - name: Checkout agentic-browdie
        uses: actions/checkout@v4
        with:
          repository: justrach/agentic-browdie
          path: agentic-browdie

      - name: Setup Zig 0.15.1
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      # ── Unit tests (browdie — no Chrome needed) ──────────────────────────
      - name: browdie unit tests (163 tests, no Chrome)
        working-directory: agentic-browdie
        run: zig test src/main.zig

      # ── Build both binaries ───────────────────────────────────────────────
      - name: Build merjs
        run: |
          zig build codegen
          zig build

      - name: Build browdie + merjs-e2e
        working-directory: agentic-browdie
        run: zig build merjs-e2e

      # ── Start Chrome (headless) ───────────────────────────────────────────
      - name: Install Chromium
        run: sudo apt-get update && sudo apt-get install -y chromium-browser

      - name: Start Chrome
        run: |
          chromium-browser \
            --headless=new \
            --disable-gpu \
            --no-sandbox \
            --remote-debugging-port=9222 &
          sleep 2

      # ── Start merjs ───────────────────────────────────────────────────────
      - name: Start merjs
        run: |
          ./zig-out/bin/merjs --port 3000 --no-dev &
          sleep 1

      # ── Start browdie ─────────────────────────────────────────────────────
      - name: Start browdie
        run: |
          CDP_URL=ws://localhost:9222 \
            agentic-browdie/zig-out/bin/agentic-browdie &
          sleep 2

      # ── Run E2E suite ─────────────────────────────────────────────────────
      - name: Run merjs E2E tests
        run: agentic-browdie/zig-out/bin/merjs-e2e
