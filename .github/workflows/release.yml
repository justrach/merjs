name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    name: Build & publish release

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build check
        run: |
          zig build codegen
          zig build

      - name: Run tests
        run: zig build test

      - name: Cross-compile CLI
        run: |
          mkdir -p release
          zig build cli -Doptimize=ReleaseSmall -Dtarget=aarch64-macos
          cp zig-out/bin/mer release/mer-macos-aarch64
          zig build cli -Doptimize=ReleaseSmall -Dtarget=x86_64-macos
          cp zig-out/bin/mer release/mer-macos-x86_64
          zig build cli -Doptimize=ReleaseSmall -Dtarget=x86_64-linux
          cp zig-out/bin/mer release/mer-linux-x86_64
          zig build cli -Doptimize=ReleaseSmall -Dtarget=aarch64-linux
          cp zig-out/bin/mer release/mer-linux-aarch64

      - name: Generate checksums
        working-directory: release
        run: sha256sum mer-* > checksums.txt

      - name: Write release notes
        run: |
          cat > release/notes.md <<'EOF'
          ## Install

          ```bash
          curl -fsSL https://raw.githubusercontent.com/justrach/merjs/main/scripts/install-mer.sh | sh
          ```

          Manual install: download the matching `mer-*` binary below, rename it to `mer`, then place it on your `PATH`.
          EOF

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            release/mer-macos-aarch64 \
            release/mer-macos-x86_64 \
            release/mer-linux-x86_64 \
            release/mer-linux-aarch64 \
            release/checksums.txt \
            --notes-file release/notes.md \
            --title "${{ github.ref_name }}" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
